name: Daily dashboard release

on:
  schedule:
    # 13:00 UTC = 9:00 AM ET (EDT). Drifts to 8 AM ET in winter (EST), which is fine.
    - cron: '0 13 * * *'
  workflow_dispatch: {}  # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run daily release
        run: python scripts/daily_release.py

      - name: Commit changes (if any)
        run: |
          git config user.name "creao-bot"
          git config user.email "creao-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            DAY=$(date -u +%Y-%m-%d)
            git add -A
            git commit -m "Auto-release: dashboards updated for ${DAY}"
            git push
          else
            echo "No changes to commit."
          fi
