<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Creao — Client Dashboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0b;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .wrap {
      max-width: 640px;
      width: 100%;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
    }
    .brand-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .subtitle {
      color: #a1a1aa;
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }
    .clients {
      display: grid;
      gap: 0.75rem;
    }
    .client-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.15s ease;
    }
    .client-card:hover {
      border-color: #14b8a6;
      background: #1f1f23;
      transform: translateY(-1px);
    }
    .client-info { display: flex; flex-direction: column; gap: 0.25rem; }
    .client-name {
      font-weight: 600;
      font-size: 1rem;
    }
    .client-path {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 0.8rem;
      color: #71717a;
    }
    .arrow {
      color: #52525b;
      transition: color 0.15s ease, transform 0.15s ease;
    }
    .client-card:hover .arrow {
      color: #14b8a6;
      transform: translateX(2px);
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #52525b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div class="brand-name">Creao</div>
    </div>
    <h1>Client Dashboards</h1>
    <p class="subtitle">Performance reporting and payout tracking for partner accounts.</p>
    <div class="clients">
      <a href="./brian-jupina/" class="client-card">
        <div class="client-info">
          <div class="client-name">Brian Jupina</div>
          <div class="client-path">app.creao.co/brian-jupina</div>
        </div>
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="./nelson-bendeck/" class="client-card">
        <div class="client-info">
          <div class="client-name">Nelson Bendeck</div>
          <div class="client-path">app.creao.co/nelson-bendeck</div>
        </div>
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="./jim-erwin/" class="client-card">
        <div class="client-info">
          <div class="client-name">Jim Erwin</div>
          <div class="client-path">app.creao.co/jim-erwin</div>
        </div>
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
    <div class="footer">© Creao</div>
  </div>
</body>
</html>
